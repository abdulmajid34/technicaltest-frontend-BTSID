server {
    listen       80;
    server_name  _;
    root         /usr/share/nginx/html;
    index        index.html;

    # Charset untuk CSS & HTML
    charset utf-8;

    # Gzip compression
    gzip                on;
    gzip_vary           on;
    gzip_proxied        any;
    gzip_comp_level     6;
    gzip_buffers        16 8k;
    gzip_min_length     256;
    gzip_types          text/plain text/css text/xml text/javascript
                        application/json application/javascript application/x-javascript
                        application/rss+xml application/atom+xml
                        image/svg+xml font/woff font/woff2;

    # Security headers
    add_header X-Frame-Options         "SAMEORIGIN"    always;
    add_header X-Content-Type-Options  "nosniff"       always;
    add_header X-XSS-Protection        "1; mode=block" always;
    add_header Referrer-Policy         "strict-origin-when-cross-origin" always;

    # index.html – jangan di-cache agar SPA selalu fresh
    location = /index.html {
        add_header Cache-Control "no-cache, no-store, must-revalidate" always;
        add_header Pragma        "no-cache"                            always;
        add_header Expires       "0"                                   always;
        try_files $uri =404;
    }

    # Vite-hashed assets (js, css, woff2, dll) – cache permanen karena hash unik
    location ~* \.(js|css|woff2?|ttf|otf|eot|png|jpg|jpeg|gif|ico|svg|webp)$ {
        add_header Cache-Control "public, max-age=31536000, immutable" always;
        try_files $uri =404;
    }

    # SPA fallback – redirect semua route ke index.html
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Deny hidden files
    location ~ /\. {
        deny all;
    }
}
